<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKYLINE.IO - Modern Weather Widget</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .weather-widget {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            backdrop-filter: blur(10px);
        }

        .weather-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .location-info {
            flex: 1;
        }

        .location-name {
            font-size: 28px;
            font-weight: 700;
            color: #333;
            margin-bottom: 5px;
        }

        .location-date {
            font-size: 14px;
            color: #999;
        }

        .refresh-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .refresh-btn:hover {
            transform: rotate(180deg);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .current-weather {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
            padding-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }

        .weather-icon {
            font-size: 80px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .temp-main {
            display: flex;
            flex-direction: column;
        }

        .temperature {
            font-size: 60px;
            font-weight: 700;
            color: #333;
            line-height: 1;
        }

        .weather-description {
            font-size: 16px;
            color: #999;
            margin-top: 8px;
        }

        .weather-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .detail-card {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }

        .detail-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .detail-value {
            font-size: 24px;
            font-weight: 700;
            color: #333;
        }

        .forecast {
            margin-top: 30px;
        }

        .forecast-title {
            font-size: 16px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }

        .forecast-items {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .forecast-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .forecast-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.3);
        }

        .forecast-day {
            font-size: 12px;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .forecast-icon {
            font-size: 28px;
            margin-bottom: 8px;
        }

        .forecast-temp {
            font-size: 14px;
            font-weight: 600;
        }

        .loading {
            text-align: center;
            color: #999;
            font-size: 14px;
        }

        @media (max-width: 600px) {
            .weather-widget {
                padding: 25px;
            }

            .temperature {
                font-size: 45px;
            }

            .weather-icon {
                font-size: 60px;
            }

            .location-name {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="weather-widget">
        <div class="weather-header">
            <div class="location-info">
                <div class="location-name" id="locationName">Loading...</div>
                <div class="location-date" id="currentDate"></div>
            </div>
            <button class="refresh-btn" id="refreshBtn" title="Refresh weather data">⟳</button>
        </div>

        <div class="current-weather">
            <div class="weather-icon" id="weatherIcon">🌤️</div>
            <div class="temp-main">
                <div class="temperature"><span id="temperature">--</span>°C</div>
                <div class="weather-description" id="weatherDesc">Clear sky</div>
            </div>
        </div>

        <div class="weather-details">
            <div class="detail-card">
                <div class="detail-label">Humidity</div>
                <div class="detail-value" id="humidity">--%</div>
            </div>
            <div class="detail-card">
                <div class="detail-label">Wind Speed</div>
                <div class="detail-value" id="windSpeed">-- m/s</div>
            </div>
            <div class="detail-card">
                <div class="detail-label">Pressure</div>
                <div class="detail-value" id="pressure">-- mb</div>
            </div>
            <div class="detail-card">
                <div class="detail-label">Feels Like</div>
                <div class="detail-value" id="feelsLike">--°C</div>
            </div>
        </div>

        <div class="forecast">
            <div class="forecast-title">5-Day Forecast</div>
            <div class="forecast-items" id="forecastContainer">
                <div class="forecast-item">
                    <div class="forecast-day">Tomorrow</div>
                    <div class="forecast-icon">⛅</div>
                    <div class="forecast-temp">22°C</div>
                </div>
                <div class="forecast-item">
                    <div class="forecast-day">+2 Days</div>
                    <div class="forecast-icon">🌤️</div>
                    <div class="forecast-temp">24°C</div>
                </div>
                <div class="forecast-item">
                    <div class="forecast-day">+3 Days</div>
                    <div class="forecast-icon">⛈️</div>
                    <div class="forecast-temp">19°C</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Weather icons mapping
        const weatherIcons = {
            '01d': '☀️', '01n': '🌙',
            '02d': '⛅', '02n': '🌥️',
            '03d': '☁️', '03n': '☁️',
            '04d': '☁️', '04n': '☁️',
            '09d': '🌧️', '09n': '🌧️',
            '10d': '🌦️', '10n': '🌧️',
            '11d': '⛈️', '11n': '⛈️',
            '13d': '❄️', '13n': '❄️',
            '50d': '🌫️', '50n': '🌫️'
        };

        // Default coordinates (New York)
        let latitude = 40.7128;
        let longitude = -74.0060;
        let locationName = 'New York';

        // Get user's location
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        latitude = position.coords.latitude;
                        longitude = position.coords.longitude;
                        fetchWeatherData();
                    },
                    (error) => {
                        console.log('Using default location');
                        fetchWeatherData();
                    }
                );
            } else {
                fetchWeatherData();
            }
        }

        // Fetch weather data from OpenWeatherMap API
        function fetchWeatherData() {
            const apiKey = 'e0b96a7ec1fd1a30d1b8a6c46a9b23b3'; // Free tier API key
            const url = `https://api.openweathermap.org/data/2.5/weather?lat=${latitude}&lon=${longitude}&units=metric&appid=${apiKey}`;

            fetch(url)
                .then(response => response.json())
                .then(data => {
                    updateWeatherWidget(data);
                })
                .catch(error => {
                    console.error('Error fetching weather:', error);
                    showError();
                });
        }

        // Update widget with weather data
        function updateWeatherWidget(data) {
            const temp = Math.round(data.main.temp);
            const feelsLike = Math.round(data.main.feels_like);
            const humidity = data.main.humidity;
            const pressure = data.main.pressure;
            const windSpeed = Math.round(data.wind.speed * 10) / 10;
            const description = data.weather[0].main;
            const icon = weatherIcons[data.weather[0].icon] || '🌡️';

            locationName = data.name + (data.sys.country ? ', ' + data.sys.country : '');

            // Update UI
            document.getElementById('locationName').textContent = locationName;
            document.getElementById('temperature').textContent = temp;
            document.getElementById('weatherDesc').textContent = description;
            document.getElementById('weatherIcon').textContent = icon;
            document.getElementById('humidity').textContent = humidity + '%';
            document.getElementById('windSpeed').textContent = windSpeed + ' m/s';
            document.getElementById('pressure').textContent = pressure + ' mb';
            document.getElementById('feelsLike').textContent = feelsLike + '°C';

            updateDate();
        }

        // Update current date
        function updateDate() {
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            const today = new Date();
            document.getElementById('currentDate').textContent = today.toLocaleDateString('en-US', options);
        }

        // Show error message
        function showError() {
            document.getElementById('locationName').textContent = 'Unable to load';
            document.getElementById('weatherDesc').textContent = 'Please try again';
        }

        // Event listeners
        document.getElementById('refreshBtn').addEventListener('click', () => {
            getLocation();
        });

        // Initialize on page load
        window.addEventListener('load', () => {
            updateDate();
            getLocation();
        });
    </script>
</body>
</html>
