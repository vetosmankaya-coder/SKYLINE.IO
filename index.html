<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKYLINE.IO - Universal Climate Intelligence</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        
        body { 
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 15px; 
            overflow-x: hidden;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            color: #1e293b;
            position: relative;
        }

        /* Akıllı ve İç Açıcı Dinamik Arka Planlar */
        body.sunny { background: linear-gradient(135deg, #fff7ed 0%, #ffedd5 40%, #bae6fd 100%); }
        body.cloudy { background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 50%, #cbd5e1 100%); }
        body.rainy { background: linear-gradient(135deg, #cbd5e1 0%, #94a3b8 60%, #475569 100%); color: #ffffff; }
        body.snowy { background: linear-gradient(135deg, #ffffff 0%, #f1f5f9 60%, #e2e8f0 100%); }

        .weather-effects { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; overflow: hidden; }
        .particle { position: absolute; border-radius: 50%; animation: fall linear infinite; }
        @keyframes fall {
            0% { transform: translateY(-30px) translateX(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(105vh) translateX(60px) rotate(360deg); opacity: 0; }
        }

        /* Mobil ve Masaüstü Tam Uyumlu Premium Cam Panel */
        .app-container { 
            width: 100%; 
            max-width: 460px; 
            background: rgba(255, 255, 255, 0.45); 
            backdrop-filter: blur(35px); 
            -webkit-backdrop-filter: blur(35px);
            border: 1px solid rgba(255,255,255,0.5); 
            padding: 25px; 
            border-radius: 32px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.04); 
            z-index: 10;
        }
        
        body.rainy .app-container { background: rgba(15, 23, 42, 0.55); border-color: rgba(255,255,255,0.15); }

        .search-row { display: flex; gap: 8px; margin-bottom: 12px; }
        input { flex: 1; background: rgba(255,255,255,0.6); border: 1px solid rgba(0,0,0,0.04); padding: 12px 15px; color: inherit; border-radius: 16px; outline: none; font-size: 15px; font-weight: 600; }
        button { background: #0a84ff; color: #fff; border: none; padding: 12px 18px; border-radius: 16px; font-weight: 700; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; }
        button.add-fav { background: #34c759; }
        button:active { transform: scale(0.95); }
        
        .fav-bar { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 12px; scrollbar-width: none; min-height: 38px; }
        .fav-bar::-webkit-scrollbar { display: none; }
        .fav-chip { background: rgba(255,255,255,0.6); border: 1px solid rgba(255,255,255,0.4); padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 700; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; gap: 4px; }
        .fav-chip .del-btn { color: #ff3b30; font-weight: bold; margin-left: 4px; font-size: 14px; padding: 0 2px; }

        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .location { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; }
        .date { font-size: 12px; opacity: 0.65; font-weight: 700; text-transform: uppercase; margin-top: 2px; }
        .action-btns { display: flex; gap: 8px; }
        .icon-btn { background: rgba(0,0,0,0.05); border: none; color: inherit; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 16px; }
        .icon-btn:hover { background: rgba(0,0,0,0.1); }
        
        /* Opet Tipi Hayat Enerjisi Veren Şefkat Baloncuğu */
        .care-bubble {
            background: rgba(255, 255, 255, 0.8);
            border-left: 5px solid #0a84ff;
            padding: 14px 16px;
            border-radius: 18px;
            margin-bottom: 18px;
            font-size: 14px;
            font-weight: 600;
            line-height: 1.45;
            box-shadow: 0 6px 15px rgba(0,0,0,0.01);
        }
        body.rainy .care-bubble { background: rgba(30, 41, 59, 0.8); border-left-color: #5856d6; }

        .settings-panel { display: none; background: rgba(255,255,255,0.95); border-radius: 20px; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.05); }
        body.rainy .settings-panel { background: #1e293b; color: #fff; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; font-weight: 700; font-size: 14px; }
        .setting-row:last-child { margin-bottom: 0; }
        select, .toggle-btn { background: rgba(0,0,0,0.06); color: inherit; border: none; padding: 6px 12px; border-radius: 10px; font-size: 13px; cursor: pointer; font-weight: 700; outline: none; }
        body.rainy select, body.rainy .toggle-btn { background: rgba(255,255,255,0.1); }

        /* Kanlı Canlı Yeni Nesil Grafikler */
        .main-display { text-align: center; padding: 15px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
        .weather-visual-box { width: 90px; height: 90px; margin: 0 auto 8px; position: relative; display: flex; justify-content: center; align-items: center; }
        .vector-sun { width: 55px; height: 55px; background: radial-gradient(circle, #ffea00 0%, #ff9100 100%); border-radius: 50%; box-shadow: 0 0 25px #ffaa00; animation: rotateSun 15s linear infinite; }
        .vector-cloud { width: 65px; height: 35px; background: rgba(241, 245, 249, 0.95); border-radius: 20px; position: absolute; bottom: 8px; right: 8px; box-shadow: 0 6px 12px rgba(0,0,0,0.05); animation: floatCloud 4s ease-in-out infinite; }
        .vector-cloud::before { content:''; width: 35px; height: 35px; background: rgba(241, 245, 249, 0.95); border-radius: 50%; position: absolute; top: -18px; left: 10px; }
        .vector-cloud::after { content:''; width: 28px; height: 28px; background: rgba(241, 245, 249, 0.95); border-radius: 50%; position: absolute; top: -12px; right: 12px; }
        
        @keyframes rotateSun { 100% { transform: rotate(360deg); } }
        @keyframes floatCloud { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }

        .main-temp { font-size: 68px; font-weight: 200; line-height: 1; margin: 5px 0; letter-spacing: -2px; }
        .condition { font-size: 14px; opacity: 0.85; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; }
        
        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .stat-card { background: rgba(255,255,255,0.4); padding: 14px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.25); }
        body.rainy .stat-card { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.05); }
        .stat-label { font-size: 11px; opacity: 0.6; text-transform: uppercase; margin-bottom: 3px; font-weight: 800; }
        .stat-value { font-size: 15px; font-weight: 700; display: flex; align-items: center; gap: 4px; }
        .wind-arrow { display: inline-block; font-size: 14px; transform: rotate(0deg); transition: transform 0.8s ease; color: #0a84ff; font-weight: bold; }

        .section-title { font-size: 12px; font-weight: 800; opacity: 0.6; text-transform: uppercase; margin: 15px 0 8px 0; letter-spacing: 0.5px; }
        .hourly-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 6px; scrollbar-width: none; }
        .hourly-item { background: rgba(255,255,255,0.4); padding: 10px; border-radius: 16px; min-width: 64px; text-align: center; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.15); }
        body.rainy .hourly-item { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.05); }
        .hourly-item div { font-weight: 700; font-size: 12px; }
    </style>
</head>
<body>

    <div class="weather-effects" id="weatherEffects"></div>

    <div class="app-container">
        <!-- Tamamen Dinamik Arama Alanı -->
        <div class="search-row">
            <input type="text" id="searchInput" placeholder="...">
            <button onclick="searchLocation()">🔍</button>
            <button class="add-fav" onclick="addCurrentToFavorites()">＋</button>
        </div>

        <div class="fav-bar" id="favBar"></div>

        <!-- 100% Türkçe Uyumlu Ayarlar Paneli -->
        <div class="settings-panel" id="settingsPanel">
            <div class="setting-row"><span id="lblSettingTemp">Temperature Unit</span><button class="toggle-btn" id="btnTempUnit" onclick="toggleTempUnit()">°C</button></div>
            <div class="setting-row"><span id="lblSettingWind">Wind Unit</span><button class="toggle-btn" id="btnWindUnit" onclick="toggleWindUnit()">km/h</button></div>
            <div class="setting-row"><span id="lblSettingLang">Language</span>
                <select id="langSelect" onchange="changeLanguage(this.value)">
                    <option value="en">English</option>
                    <option value="tr">Türkçe</option>
                    <option value="zh">中文</option>
                    <option value="es">Español</option>
                    <option value="ar">العربية</option>
                </select>
            </div>
        </div>

        <div class="header">
            <div>
                <div class="location" id="locName">Istanbul</div>
                <div class="date" id="liveDate">--</div>
            </div>
            <div class="action-btns">
                <button class="icon-btn" onclick="toggleSettings()">⚙️</button>
                <button class="icon-btn" onclick="syncEcosystem()">⟳</button>
            </div>
        </div>

        <!-- Opet Felsefesi Ruh Şifa Kutusu -->
        <div class="care-bubble" id="careBubble">...</div>

        <div class="main-display">
            <div class="weather-visual-box">
                <div class="vector-sun" id="vSun"></div>
                <div class="vector-cloud" id="vCloud"></div>
            </div>
            <div class="main-temp" id="mainTemp">--</div>
            <div class="condition" id="mainDesc">--</div>
        </div>

        <div class="grid-stats">
            <div class="stat-card">
                <div class="stat-label" id="lblWind">Wind Vector</div>
                <div class="stat-value"><span class="wind-arrow" id="windArrow">➔</span> <span id="statWind">--</span></div>
            </div>
            <div class="stat-card">
                <div class="stat-label" id="lblPollen">Pollen Index</div>
                <div class="stat-value" id="statPollen">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label" id="lblHumid">Humidity</div>
                <div class="stat-value" id="statHumid">--</div>
            </div>
            <div class="stat-card">
                <div class="stat-label" id="lblUV">UV Index</div>
                <div class="stat-value" id="statUV">--</div>
            </div>
        </div>

        <div class="section-title" id="lblHourly">Hourly Timeline</div>
        <div class="hourly-scroll" id="hourlyContainer"></div>
    </div>

    <script>

            es: { search: "Buscar pueblo, ciudad...", wind: "Viento", pollen: "Índice Polen", humid: "Humedad", uv: "Índice UV", hourly: "Pronóstico por hora", err: "Lugar no encontrado", sTemp: "Unidad Temperatura", sWind: "Unidad Viento", sLang: "Idioma", statusSunny: "SOLEADO Y FRESCO", statusCloudy: "NUBADO PACÍFICO", statusRainy: "LLUVIA REFRESCANTE", statusSnowy: "NIEVE BLANCA", textGood: "Bueno", textRisk: "Riesgo Máx" },
            ar: { search: "ابحث عن قرية, مدينة...", wind: "سرعة الرياح", pollen: "مؤشر اللقاح", humid: "الرطوبة", uv: "مؤشر الأشعة", hourly: "الجدول الزمني", err: "لم يتم العثور على الموقع", sTemp: "وحدة الحرارة", sWind: "وحدة الرياح", sLang: "اللغة", statusSunny: "مشمس ونقي", statusCloudy: "غائم وهادئ", statusRainy: "مطر الخير", statusSnowy: "ثلوج بيضاء", textGood: "جيد", textRisk: "خطر أقصى" }
        };

        const careMessages = {
            en: {
                sunny: "You look absolutely gorgeous today! 🌟 Remember, even if the world gets busy, you are doing amazing. Take a breath and let your light shine! ☀️",

            },
            tr: {
                sunny: "Bugün harika görünüyorsun! 🌟 Unutma, hayat ne kadar yoğun olursa olsun çok iyi gidiyorsun. Derin bir nefes al ve parlamaya devam et! ☀️",
                cloudy: "Zihnini dinlendirmek ve huzurunu korumak için harika bir gün. İş yorgunluğunun seni strese sokmasına izin verme, sen her şeyden önemlisin. Bi' kahve? ☕🍃",
                rainy: "Gökyüzü bugünün tüm yorgunluğunu temizliyor. İçini sıcacık tut, şemsiyeni unutma ve hatırla: Her yağmurdan sonra daha güçlü parlayacaksın! 🌧️💖",
                snowy: "Büyüleyici, tertemiz bir gün! Hayatın stresini bir kenara bırakıp bu beyaz masalın tadını çıkar. En sıcak giysilerini seç ve gülümse! ❄️✨",
                uvHigh: "Güneş bugün tıpkı senin enerjin gibi çok güçlü! O güzel gözlerini koru ve kendine nazik davranıp biraz gölgede kal olur mu? 🕶️"
            },
            zh: {
                sunny: "你今天真好看！🌟 记住，无论生活多么忙碌，你都做得很棒。深呼吸，展现你的光芒吧！☀️",
                cloudy: "放慢脚步、守护内心平静的完美一天。别让工作压力影响你——你比任何任务都重要。喝杯咖啡吧？☕🍃",
                rainy: "天空正在洗去昨天的疲惫。保持内心的温暖，带上雨伞，记住：风雨过后，你会闪耀得更加明亮！🌧️💖",

                rainy: "El cielo limpia las preocupaciones de ayer. Mantén tu corazón cálido, no olvides tu paraguas y recuerda: ¡después de la lluvia brillarás! 🌧️💖",

                rainy: "السماء تغسل كل تعب الأمس. حافظ على دفء قلبك، لا تنسَ مظلتك، وتذكر: بعد كل مطر ستشرق بقوة أكبر! 🌧️💖",
                snowy: "يوم شتوي ساحر ونقي! اترك ضغوط الحياة واستمتع بهذه القصة البيضاء. اختر أدفأ ملابسك وابتسم! ❄️✨",
                uvHigh: "الشمس قوية اليوم تماماً مثل طاقتك! احمِ عينيك الجميلة وحاول البقاء في الظل، حسناً؟ 🕶️"
            }
        };

        window.onload = function() {
            // Otomatik Dil Tespiti
            let browserLang = navigator.language.split('-')[0];
            if (translations[browserLang]) config.lang = browserLang;
            document.getElementById('langSelect').value = config.lang;
            
            // Sistemi Kur ve Çalıştır
            changeLanguage(config.lang);
            renderFavorites();
        };

        function toggleSettings() {
            const panel = document.getElementById('settingsPanel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        // Dil Değiştiğinde A'dan Z'ye Her Şeyi Çeviren Mekanizma
        function changeLanguage(lang) {
            config.lang = lang;
            
            // Statik Etiketlerin Çevirisi
            document.getElementById('searchInput').placeholder = translations[lang].search;
            document.getElementById('lblWind').innerText = translations[lang].wind;
            document.getElementById('lblPollen').innerText = translations[lang].pollen;
            document.getElementById('lblHumid').innerText = translations[lang].humid;
            document.getElementById('lblUV').innerText = translations[lang].uv;
            document.getElementById('lblHourly').innerText = translations[lang].hourly;
            
            // Ayarlar Menüsü Çevirisi
            document.getElementById('lblSettingTemp').innerText = translations[lang].sTemp;
            document.getElementById('lblSettingWind').innerText = translations[lang].sWind;
            document.getElementById('lblSettingLang').innerText = translations[lang].sLang;
            
            // Verileri Yeni Dilde Çek
            fetchWeatherData(currentCoords.lat, currentCoords.lon, currentCoords.name);
        }

        function toggleTempUnit() {
            config.temp = config.temp === 'C' ? 'F' : 'C';
            document.getElementById('btnTempUnit').innerText = '°' + config.temp;
            fetchWeatherData(currentCoords.lat, currentCoords.lon, currentCoords.name);
        }

        function toggleWindUnit() {
            config.wind = config.wind === 'kmh' ? 'mph' : 'kmh';
            document.getElementById('btnWindUnit').innerText = config.wind === 'kmh' ? 'km/h' : 'mph';
            fetchWeatherData(currentCoords.lat, currentCoords.lon, currentCoords.name);
        }

        async function searchLocation() {
            const query = document.getElementById('searchInput').value;
            if(!query) return;
            try {
                const res = await fetch(`https://open-meteo.com{encodeURIComponent(query)}&count=1&format=json`);
                const data = await res.json();
                if(!data || !data.results || data.results.length === 0) { alert(translations[config.lang].err); return; }
                const target = data.results[0];
                currentCoords = { lat: target.latitude, lon: target.longitude, name: target.name };
                localStorage.setItem('skyline_last_coords', JSON.stringify(currentCoords));
                fetchWeatherData(target.latitude, target.longitude, target.name);
            } catch(e) { console.log("Search error"); }
        }

        async function fetchWeatherData(lat, lon, name) {
            const tUnit = config.temp === 'F' ? 'fahrenheit' : 'celsius';
            const wUnit = config.wind === 'mph' ? 'mph' : 'kmh';
            
            // Kurşun Geçirmez ve Kesintisiz Veri Yolu (Tüm Güvenlik Duvarları Kırıldı)
            const url = `https://open-meteo.com{lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m,wind_direction_10m&hourly=temperature_2m,uv_index,birch_pollen&temperature_unit=${tUnit}&wind_speed_unit=${wUnit}&timezone=auto`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                if(!data || !data.current) return;
                
                document.getElementById('locName').innerText = name;
                document.getElementById('liveDate').innerText = new Date().toLocaleDateString(config.lang, { weekday: 'short', month: 'short', day: 'numeric' });
                document.getElementById('mainTemp').innerText = `${Math.round(data.current.temperature_2m)}°${config.temp}`;
                
                // Rüzgar ve Pusula Hesaplayıcı
                const wSpeed = data.current.wind_speed_10m;
                const wUnitLabel = config.wind === 'kmh' ? 'km/h' : 'mph';
                document.getElementById('statWind').innerText = `${wSpeed} ${wUnitLabel}`;
