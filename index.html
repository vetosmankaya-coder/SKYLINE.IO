<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKYLINE.IO - Ambient Intelligence</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; transition: all 0.5s ease; }
        
        /* Dinamik Canlı Arka Planlar (Hava Durumuna Göre Değişir) */
        body { 
            font-family: '-apple-system', BlinkMacSystemFont, sans-serif; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
            overflow-x: hidden;
            background: linear-gradient(135deg, #e0f2fe 0%, #bae6fd 100%); /* Varsayılan Ferah */
            color: #1e293b;
            position: relative;
        }

        /* Hava Durumu Temaları */
        body.sunny { background: linear-gradient(135deg, #fef08a 0%, #bae6fd 100%); color: #1e293b; }
        body.cloudy { background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%); color: #334155; }
        body.rainy { background: linear-gradient(135deg, #94a3b8 0%, #cbd5e1 100%); color: #1e293b; }
        body.snowy { background: linear-gradient(135deg, #f1f5f9 0%, #e2e8f0 100%); color: #475569; }

        /* Gökyüzü Canlı Efekt Parçacıkları Sistemi */
        .weather-effects { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; overflow: hidden; }
        .particle { position: absolute; background: rgba(255,255,255,0.7); border-radius: 50%; animation: fall linear infinite; }
        
        @keyframes fall {
            0% { transform: translateY(-20px) translateX(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(105vh) translateX(50px); opacity: 0; }
        }

        /* Premium Cam Tasarımı (Glassmorphism) */
        .app-container { 
            width: 100%; 
            max-width: 480px; 
            background: rgba(255, 255, 255, 0.45); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255,255,255,0.4); 
            padding: 25px; 
            border-radius: 32px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.05); 
            z-index: 10;
            position: relative;
        }
        
        .search-row { display: flex; gap: 8px; margin-bottom: 12px; }
        input { flex: 1; background: rgba(255,255,255,0.5); border: 1px solid rgba(0,0,0,0.05); padding: 12px; color: #1e293b; border-radius: 14px; outline: none; font-size: 15px; font-weight: 500; }
        input::placeholder { color: #64748b; }
        button { background: #0a84ff; color: #fff; border: none; padding: 12px 16px; border-radius: 14px; font-weight: 600; cursor: pointer; font-size: 15px; box-shadow: 0 4px 10px rgba(10,132,255,0.2); }
        button.add-fav { background: #34c759; box-shadow: 0 4px 10px rgba(52,199,89,0.2); }
        
        .fav-bar { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 15px; scrollbar-width: none; min-height: 40px; }
        .fav-bar::-webkit-scrollbar { display: none; }
        .fav-chip { background: rgba(255,255,255,0.6); border: 1px solid rgba(0,0,0,0.03); padding: 8px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; gap: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.02); }
        .fav-chip .del-btn { color: #ff3b30; font-weight: bold; margin-left: 6px; font-size: 14px; }

        .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; }
        .location { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
        .date { font-size: 13px; opacity: 0.7; font-weight: 500; }
        .action-btns { display: flex; gap: 10px; }
        .icon-btn { background: rgba(0,0,0,0.05); border: none; color: inherit; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; font-size: 16px; }
        .icon-btn:hover { background: rgba(0,0,0,0.1); }
        
        .settings-panel { display: none; background: rgba(255,255,255,0.8); border-radius: 24px; padding: 20px; margin-bottom: 20px; border: 1px solid rgba(0,0,0,0.05); }
        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-weight: 600; }
        select, .toggle-btn { background: rgba(0,0,0,0.05); color: inherit; border: none; padding: 8px 12px; border-radius: 10px; outline: none; font-size: 14px; cursor: pointer; font-weight: 600; }

        .main-display { text-align: center; padding: 15px 0; border-bottom: 1px solid rgba(0,0,0,0.05); }
        
        /* Gülümseyen ve Canlı Doğa Simgeleri Animasyonu */
        .weather-avatar { font-size: 64px; display: inline-block; animation: pulse 3s ease-in-out infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1) rotate(5deg); } }

        .main-temp { font-size: 72px; font-weight: 200; line-height: 1; margin: 10px 0; letter-spacing: -2px; }
        .condition { font-size: 16px; opacity: 0.8; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 20px 0; }
        .stat-card { background: rgba(255,255,255,0.4); padding: 15px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.3); box-shadow: 0 4px 10px rgba(0,0,0,0.01); }
        .stat-label { font-size: 11px; opacity: 0.6; text-transform: uppercase; margin-bottom: 4px; font-weight: 700; letter-spacing: 0.5px; }
        .stat-value { font-size: 17px; font-weight: 700; }
        
        .section-title { font-size: 13px; font-weight: 700; opacity: 0.6; text-transform: uppercase; margin: 15px 0 10px 0; letter-spacing: 0.5px; }
        .hourly-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .hourly-item { background: rgba(255,255,255,0.4); padding: 12px; border-radius: 16px; min-width: 68px; text-align: center; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.2); }
        .hourly-item div { font-weight: 600; font-size: 13px; }
    </style>
</head>
<body class="sunny">

    <!-- Canlı Parçacık Efekt Katmanı -->
    <div class="weather-effects" id="weatherEffects"></div>

    <div class="app-container">
        <div class="search-row">
            <input type="text" id="searchInput" placeholder="Search village, town, district...">
            <button onclick="searchLocation()">🔍</button>
            <button class="add-fav" onclick="addCurrentToFavorites()">＋</button>
        </div>

        <div class="fav-bar" id="favBar"></div>

        <div class="settings-panel" id="settingsPanel">
            <div class="setting-row"><span>Temperature Unit</span><button class="toggle-btn" id="btnTempUnit" onclick="toggleTempUnit()">°C</button></div>
            <div class="setting-row"><span>Wind Unit</span><button class="toggle-btn" id="btnWindUnit" onclick="toggleWindUnit()">km/h</button></div>
            <div class="setting-row"><span>Language</span>
                <select id="langSelect" onchange="changeLanguage(this.value)">
                    <option value="en">English</option>
                    <option value="tr">Türkçe</option>
                    <option value="zh">中文</option>
                    <option value="es">Español</option>
                    <option value="ar">العربية</option>
                </select>
            </div>
        </div>

        <div class="header">
            <div>
                <div class="location" id="locName">Istanbul</div>
                <div class="date" id="liveDate">--</div>
            </div>
            <div class="action-btns">
                <button class="icon-btn" onclick="toggleSettings()">⚙️</button>
                <button class="icon-btn" onclick="syncEcosystem()">⟳</button>
            </div>
        </div>

        <div class="main-display">
            <div class="weather-avatar" id="mainIcon">🌞</div>
            <div class="main-temp" id="mainTemp">--</div>
            <div class="condition" id="mainDesc">Ferah Atmosfer</div>
        </div>

        <div class="grid-stats">
            <div class="stat-card"><div class="stat-label" id="lblWind">Wind Vector</div><div class="stat-value" id="statWind">--</div></div>
            <div class="stat-card"><div class="stat-label" id="lblPollen">Pollen / AQI</div><div class="stat-value" id="statPollen">Good</div></div>
            <div class="stat-card"><div class="stat-label" id="lblHumid">Humidity</div><div class="stat-value" id="statHumid">--</div></div>
            <div class="stat-card"><div class="stat-label" id="lblUV">UV Index</div><div class="stat-value" id="statUV">Low</div></div>
        </div>

        <div class="section-title" id="lblHourly">Hourly Timeline</div>
        <div class="hourly-scroll" id="hourlyContainer"></div>
    </div>

    <script>
        let lastCoords = JSON.parse(localStorage.getItem('skyline_last_coords')) || { lat: 41.0082, lon: 28.9784, name: "Istanbul" };
        let currentCoords = { ...lastCoords };
        let favorites = JSON.parse(localStorage.getItem('skyline_favs')) || [];
        let config = { temp: 'C', wind: 'kmh', lang: 'en' };

        const translations = {
            en: { search: "Search village, town...", wind: "Wind Vector", pollen: "Pollen / AQI", humid: "Humidity", uv: "UV Index", hourly: "Hourly Timeline", err: "Location not found" },
            tr: { search: "Köy, ilçe, kasaba ara...", wind: "Rüzgar Hızı", pollen: "Polen / Hava Kalitesi", humid: "Nem Oranı", uv: "UV İndeksi", hourly: "Saatlik Tahmin", err: "Konum bulunamadı" },
            zh: { search: "搜索村庄, 城镇...", wind: "风速", pollen: "花粉 / 空气质量", humid: "湿度", uv: "紫外线指数", hourly: "每小时预报", err: "找不到位置" },
            es: { search: "Buscar pueblo, ciudad...", wind: "Viento", pollen: "Polen / ICA", humid: "Humedad", uv: "Índice UV", hourly: "Pronóstico por hora", err: "Lugar no encontrado" },
            ar: { search: "ابحث عن قرية, مدينة...", wind: "سرعة الرياح", pollen: "اللقاح / جودة الهواء", humid: "الرطوبة", uv: "مؤشر الأشعة", hourly: "الجدول الزمني بالساعات", err: "لم يتم العثور على الموقع" }
        };

        window.onload = function() {
            const browserLang = navigator.language.split('-')[0];
            if (translations[browserLang]) config.lang = browserLang;
            document.getElementById('langSelect').value = config.lang;
            
            changeLanguage(config.lang);
            renderFavorites();
            fetchWeatherData(currentCoords.lat, currentCoords.lon, currentCoords.name);
            setTimeout(syncEcosystem, 1000);
        };

        function toggleSettings() {
            const panel = document.getElementById('settingsPanel');
            panel.style.display = panel.style.display === 'block' ? 'none' : 'block';
        }

        function changeLanguage(lang) {
            config.lang = lang;
            document.getElementById('searchInput').placeholder = translations[lang].search;
            document.getElementById('lblWind').innerText = translations[lang].wind;
            document.getElementById('lblPollen').innerText = translations[lang].pollen;
            document.getElementById('lblHumid').innerText = translations[lang].humid;
            document.getElementById('lblUV').innerText = translations[lang].uv;
            document.getElementById('lblHourly').innerText = translations[lang].hourly;
            fetchWeatherData(currentCoords.lat, currentCoords.lon, currentCoords.name);
        }

        function toggleTempUnit() {
            config.temp = config.temp === 'C' ? 'F' : 'C';
            document.getElementById('btnTempUnit').innerText = '°' + config.temp;
            fetchWeatherData(currentCoords.lat, currentCoords.lon, currentCoords.name);
        }

        function toggleWindUnit() {
            config.wind = config.wind === 'kmh' ? 'mph' : 'kmh';
            document.getElementById('btnWindUnit').innerText = config.wind === 'kmh' ? 'km/h' : 'mph';
            fetchWeatherData(currentCoords.lat, currentCoords.lon, currentCoords.name);
        }

        async function searchLocation() {
            const query = document.getElementById('searchInput').value;
            if(!query) return;
            try {
                const res = await fetch(`https://open-meteo.com{encodeURIComponent(query)}&count=1&format=json`);
                const data = await res.json();
                if(!data || !data.results || data.results.length === 0) { alert(translations[config.lang].err); return; }
                const target = data.results[0];
                currentCoords = { lat: target.latitude, lon: target.longitude, name: target.name };
                localStorage.setItem('skyline_last_coords', JSON.stringify(currentCoords));
                fetchWeatherData(target.latitude, target.longitude, target.name);
            } catch(e) { alert("Network Slow"); }
        }

        async function fetchWeatherData(lat, lon, name) {
            const tUnit = config.temp === 'F' ? 'fahrenheit' : 'celsius';
            const wUnit = config.wind === 'mph' ? 'mph' : 'kmh';
            const url = `https://open-meteo.com{lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,weather_code,wind_speed_10m&hourly=temperature_2m&temperature_unit=${tUnit}&wind_speed_unit=${wUnit}&timezone=auto`;
            
            try {
                const res = await fetch(url);
                const data = await res.json();
                if(!data || !data.current) return;
                
                document.getElementById('locName').innerText = name;
                document.getElementById('liveDate').innerText = new Date().toLocaleDateString(config.lang, { weekday: 'short', month: 'short', day: 'numeric' });
                document.getElementById('mainTemp').innerText = `${Math.round(data.current.temperature_2m)}°${config.temp}`;
                document.getElementById('statWind').innerText = `${data.current.wind_speed_10m} ${config.wind === 'kmh' ? 'km/h' : 'mph'}`;
                document.getElementById('statHumid').innerText = `${data.current.relative_humidity_2m}%`;
                
                // Hava Durumu Koduna Göre Ambiyansı Değiştirme Sistemi
                updateAmbientTheme(data.current.weather_code);
                
                const hourlyCont = document.getElementById('hourlyContainer');
                hourlyCont.innerHTML = '';
                for(let i=0; i<8; i++) {
                    hourlyCont.innerHTML += `<div class="hourly-item"><div>+${i+1}h</div><div><b>${Math.round(data.hourly.temperature_2m[i])}°</b></div></div>`;
                }
            } catch(e) { console.log(e); }
        }

        // Akıllı Ambiyans ve Canlı Parçacık Motoru
        function updateAmbientTheme(code) {
            const body = document.body;
            const icon = document.getElementById('mainIcon');
            const desc = document.getElementById('mainDesc');
            const effects = document.getElementById('weatherEffects');
            effects.innerHTML = ''; // Eski efektleri temizle

            if (code <= 1) { // Güneşli / Açık
                body.className = 'sunny';
                icon.innerText = '🌞';
                desc.innerText = config.lang === 'tr' ? 'GÜNEŞLİ VE FERAH' : 'SUNNY & FRESH';
            } else if (code >= 2 && code <= 48) { // Bulutlu / Sisli
                body.className = 'cloudy';
                icon.innerText = '☁️';
                desc.innerText = config.lang === 'tr' ? 'HUZURLU BULUTLU' : 'PEACEFUL CLOUDY';
            } else if (code >= 51 && code <= 67) { // Yağmurlu
                body.className = 'rainy';
                icon.innerText = '🌧️';
                desc.innerText = config.lang === 'tr' ? 'BEREKETLİ YAĞMUR' : 'REFRESHING RAIN';
                createParticles(30, '🌧️', '2px', '15px'); // Yağmur damlaları
            } else if (code >= 71 && code <= 86) { // Karlı
                body.className = 'snowy';
                icon.innerText = '❄️';
                desc.innerText = config.lang === 'tr' ? 'BEYAZ ÖRTÜ / KARLI' : 'WHITE SNOWFLAKES';
                createParticles(20, '❄️', '12px', '12px'); // Kar taneleri
            } else { // Diğer hafif hava olayları
                body.className = 'sunny';
                icon.innerText = '🍃';
                desc.innerText = config.lang === 'tr' ? 'HAFİF ESİNTİ' : 'LIGHT BREEZE';
            }
        }

        function createParticles(count, symbol, width, height) {
            const effects = document.getElementById('weatherEffects');
            for(let i=0; i<count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.innerText = symbol === '🌧️' ? '' : symbol;
                if(symbol === '🌧️') {
                    p.style.width = width;
                    p.style.height = height;
                    p.style.background = 'rgba(255,255,255,0.4)';
                } else {
                    p.style.background = 'transparent';
                    p.style.fontSize = width;
                }
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
                p.style.animationDelay = Math.random() * 2 + 's';
                effects.appendChild(p);
            }
        }

        function addCurrentToFavorites() {
            if(favorites.length >= 7) favorites.shift();
            if(!favorites.some(f => f.name === currentCoords.name)) {
                favorites.push({ ...currentCoords });
                localStorage.setItem('skyline_favs', JSON.stringify(favorites));
                renderFavorites();
            }
        }

        function removeFavorite(index, event) {
            event.stopPropagation();
            favorites.splice(index, 1);
            localStorage.setItem('skyline_favs', JSON.stringify(favorites));
            renderFavorites();
        }

        function renderFavorites() {
            const bar = document.getElementById('favBar');
            bar.innerHTML = '';
            favorites.forEach((fav, idx) => {
                bar.innerHTML += `
                    <div class="fav-chip" onclick="loadFavorite(${idx})">
                        📍 ${fav.name} <span class="del-btn" onclick="removeFavorite(${idx}, event)">×</span>
                    </div>`;
            });
        }

        function loadFavorite(idx) {
            const fav = favorites[idx];
            currentCoords = { ...fav };
            localStorage.setItem('skyline_last_coords', JSON.stringify(currentCoords));
            fetchWeatherData(fav.lat, fav.lon, fav.name);
        }

        function syncEcosystem() {
            navigator.geolocation.getCurrentPosition((pos) => {
                currentCoords = { lat: pos.coords.latitude, lon: pos.coords.longitude, name: "Current Location" };
                localStorage.setItem('skyline_last_coords', JSON.stringify(currentCoords));
                fetchWeatherData(pos.coords.latitude, pos.coords.longitude, "Current Location");
            }, () => {
                fetchWeatherData(currentCoords.lat, currentCoords.lon, currentCoords.name);
            });
        }
    </script>
</body>
</html>
